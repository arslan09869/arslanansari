<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 220" width="190" height="220">
  <!-- Ears -->
  <rect x="38" y="20" width="22" height="58" rx="11" fill="#111"/>
  <rect x="130" y="20" width="22" height="58" rx="11" fill="#111"/>
  <rect x="43" y="27" width="12" height="40" rx="6" fill="white" opacity="0.3"/>
  <rect x="135" y="27" width="12" height="40" rx="6" fill="white" opacity="0.3"/>
  <!-- Head -->
  <rect x="28" y="62" width="134" height="92" rx="42" fill="#111"/>
  <!-- Eyes -->
  <circle cx="70" cy="100" r="11" fill="white"/>
  <circle cx="120" cy="100" r="11" fill="white"/>
  <circle cx="72" cy="100" r="5.5" fill="#111"/>
  <circle cx="122" cy="100" r="5.5" fill="#111"/>
  <!-- Nose -->
  <ellipse cx="95" cy="132" rx="9" ry="7" fill="white" opacity="0.5"/>
  <!-- Queue dots - messaging metaphor -->
  <circle cx="95" cy="170" r="5" fill="#111"/>
  <circle cx="75" cy="170" r="5" fill="#111"/>
  <circle cx="115" cy="170" r="5" fill="#111"/>
  <line x1="80" y1="170" x2="90" y2="170" stroke="#111" stroke-width="2"/>
  <line x1="100" y1="170" x2="110" y2="170" stroke="#111" stroke-width="2"/>
  <!-- Wordmark -->
  <text x="95" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#111">RABBITMQ</text>
</svg>
